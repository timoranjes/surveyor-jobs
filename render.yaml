services:
  - type: web
    name: surveyor-jobs
    runtime: python
    plan: free
    branch: main
    buildCommand: "pip install --upgrade pip && pip install -r backend/requirements.txt"
    startCommand: "uvicorn backend.main:app --host 0.0.0.0 --port $PORT"
    healthCheckPath: /
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      # Use /tmp because Render free plan has no persistent disk
      # and /var/data may not be writable. The DB is auto-restored
      # from scripts/seed_data.sql on first boot of each container.
      - key: DB_PATH
        value: /tmp/jobs.db
      - key: LLM_LOG_DIR
        value: /tmp/llm_logs
      - key: DEEPSEEK_API_KEY
        sync: false
      - key: SERPAPI_API_KEYS
        sync: false
